<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutfak Takip Paneli - Canlı Otomasyon</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 25px; }
        .panel-title { margin: 0; font-size: 28px; color: #38bdf8; font-weight: 800; letter-spacing: 1px; }
        .live-indicator { background: #2ecc71; color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; animation: pulse 2s infinite; }
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .order-card { background: white; color: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border-top: 6px solid #e67e22; display: flex; flex-direction: column; animation: slideIn 0.3s ease; }
        .card-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 10px; margin-bottom: 12px; }
        .order-items { flex: 1; margin-bottom: 15px; }
        .order-item-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; background: #f8fafc; padding: 4px 8px; border-radius: 4px; }
        .order-note { font-size: 12px; font-style: italic; color: #64748b; background: #f1f5f9; padding: 8px; border-radius: 6px; border-left: 3px solid #cbd5e1; margin-bottom: 15px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 18px; padding-top: 10px; border-top: 1px solid #e2e8f0; }
        .complete-btn { background: #2ecc71; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .complete-btn:hover { background: #27ae60; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="panel-title">MUTFAK CANLI SİPARİŞ TAKİP SİSTEMİ</h1>
        <div class="live-indicator">● BULUT BAĞLANTI AKTİF</div>
    </div>

    <div class="orders-grid" id="ordersContainer">
        <p id="noOrderText" style="color: #64748b; font-size: 16px; text-align: center; grid-column: 1/-1; margin-top: 50px;">Henüz aktif bir sipariş bulunmuyor. Telefondan sipariş gönderilmesi bekleniyor...</p>
    </div>

    <script>
        // SİZİN GÖNDERDİĞİNİZ FIREBASE ENTEGRASYONU 🌟
        const firebaseConfig = {
            apiKey: "AIzaSyC2vY1s-8E4DnoHMqxONwhURVnDMUowRfs",
            authDomain: "ar-menu-cd9c2.firebaseapp.com",
            databaseURL: "https://ar-menu-cd9c2-default-rtdb.firebaseio.com",
            projectId: "ar-menu-cd9c2",
            storageBucket: "ar-menu-cd9c2.firebasestorage.app",
            messagingSenderId: "229686311415",
            appId: "1:229686311415:web:e7298b498e8f12487bd6f2",
            measurementId: "G-WV394QDM0Y"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const container = document.getElementById('ordersContainer');
        const noOrderText = document.getElementById('noOrderText');

        database.ref('siparisler').on('child_added', (snapshot) => {
            const orderId = snapshot.key;
            const data = snapshot.val();
            
            if(noOrderText) noOrderText.style.display = 'none';

            let itemsHtml = '';
            data.urunler.forEach(u => {
                itemsHtml += `
                    <div class="order-item-row">
                        <span>${u.isim} <strong>x${u.adet}</strong></span>
                        <span>${u.tutar} TL</span>
                    </div>`;
            });

            const card = document.createElement('div');
            card.className = 'order-card';
            card.id = `card-${orderId}`;
            card.innerHTML = `
                <div class="card-header">
                    <span style="color:#e67e22;">${data.masa}</span>
                    <span style="font-size:12px; color:#64748b;">${data.tarih.split(' ')[1]}</span>
                </div>
                <div class="order-items">
                    ${itemsHtml}
                </div>
                <div class="order-note"><strong>Not:</strong> ${data.not}</div>
                <div class="card-footer">
                    <span style="color:#2c3e50;">${data.toplam} TL</span>
                    <button class="complete-btn" onclick="completeOrder('${orderId}')">Teslim Et</button>
                </div>
            `;
            container.appendChild(card);
        });

        function completeOrder(orderId) {
            database.ref('siparisler/' + orderId).remove()
                .then(() => {
                    const card = document.getElementById(`card-${orderId}`);
                    if(card) card.remove();
                    if(container.children.length === 1) {
                        noOrderText.style.display = 'block';
                    }
                });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>xr MENÜ</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
        
        /* ÜST BAŞLIK VE KATEGORİ PANELİ */
        .ui-header {
            position: absolute; top: 0; left: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 75%, rgba(0,0,0,0) 100%);
            z-index: 999; display: flex; flex-direction: column; align-items: center;
            padding: 15px 0 20px 0; box-sizing: border-box;
        }
        .site-title {
            color: #f1c40f; font-size: 26px; font-weight: 800; margin: 0 0 12px 0;
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        .category-container { display: flex; justify-content: center; gap: 6px; width: 100%; flex-wrap: wrap; padding: 0 10px; box-sizing: border-box; }
        .category-btn {
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 12px; border-radius: 20px; font-weight: bold; color: white;
            cursor: pointer; transition: 0.2s; font-size: 11px; backdrop-filter: blur(5px);
        }
        .category-btn.active { background: #e67e22; color: white; border-color: #e67e22; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.5); }

        /* SAĞ VE SOL İLERİ/GERİ OK BUTONLARI */
        .nav-arrow {
            position: absolute; top: 45%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6); color: #f1c40f; border: 2px solid rgba(255,255,255,0.2);
            width: 55px; height: 55px; border-radius: 50%; font-size: 24px; font-weight: bold;
            z-index: 998; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .nav-arrow:active { transform: translateY(-50%) scale(0.9); background: #e67e22; color: white; }
        .nav-arrow.left { left: 15px; }
        .nav-arrow.right { right: 15px; }

        /* MODEL BİLGİSİ İPUCU */
        .model-counter {
            position: absolute; top: 115px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 5px 15px; border-radius: 15px;
            font-size: 12px; font-weight: 600; z-index: 990; pointer-events: none;
        }

        /* DETAY PANELİ (BOTTOM SHEET) */
        .bottom-sheet {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: white; border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 20px 24px 25px 24px; box-sizing: border-box; z-index: 1000;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.3);
        }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .food-title { margin: 0; font-size: 20px; color: #2c3e50; font-weight: 700; }
        .food-price { font-size: 18px; font-weight: bold; color: #e67e22; }
        .food-info-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .badge { background: #f0f3f4; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: #7f8c8d; font-weight: 600; }
        .food-description { color: #5d6d7e; font-size: 13px; line-height: 1.4; margin: 0 0 15px 0; height: 38px; overflow-y: auto; }
        .add-to-cart-btn {
            width: 100%; background: #2ecc71; color: white; border: none; padding: 14px;
            border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(46,204,113,0.2);
        }
        
        .arjs-loader { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-header">
        <h1 class="site-title">AR MENÜ</h1>
        <div class="category-container">
            <button class="category-btn active" onclick="changeCategory('yemekler', this)">Yemekler</button>
            <button class="category-btn" onclick="changeCategory('atıştırmalıklar', this)">Atıştırmalıklar</button>
            <button class="category-btn" onclick="changeCategory('tatlılar', this)">Tatlılar</button>
            <button class="category-btn" onclick="changeCategory('içecekler', this)">İçecekler</button>
        </div>
    </div>

    <button class="nav-arrow left" onclick="navigateModel(-1)">❮</button>
    <button class="nav-arrow right" onclick="navigateModel(1)">❯</button>

    <div class="model-counter" id="modelCounter">1 / 6</div>

    <a-scene mindar-image="imageTargetSrc: ./menu.mind; filterMinCF:0.001; filterBeta: 0.01;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="adanaModel" src="./mustafa_-_adana.glb"></a-asset-item>
            <a-asset-item id="cigKofteModel" src="./mustafa_-_cig_kofte.glb"></a-asset-item>
            <a-asset-item id="burgerModel" src="./burger_and_chips.glb"></a-asset-item>
            <a-asset-item id="pideModel" src="./pide_turkish_pizzakusbaskasar.glb"></a-asset-item>
            <a-asset-item id="pizzaModel" src="./pizza.glb"></a-asset-item>
            <a-asset-item id="gozlemeModel" src="./gözleme.glb"></a-asset-item>
            
            <a-asset-item id="pringlesModel" src="./pringles_chips_can.glb"></a-asset-item>
            <a-asset-item id="laysModel" src="./lays_kırmızı.glb"></a-asset-item>
            <a-asset-item id="chipsModel" src="./chips_mavi.glb"></a-asset-item>
            
            <a-asset-item id="baklavaModel" src="./baklava_ince_tablak.glb"></a-asset-item>
            <a-asset-item id="cookiesModel" src="./cookies.glb"></a-asset-item>
            <a-asset-item id="pancakeModel" src="./dessert_for_breakfast.glb"></a-asset-item>
            <a-asset-item id="iceCreamModel" src="./ice_cream.glb"></a-asset-item>

            <a-asset-item id="ayranModel" src="./ayran_turkish_drink_game_asset.glb"></a-asset-item>
            <a-asset-item id="kahveModel" src="./turkish_coffee.glb"></a-asset-item>
            <a-asset-item id="teaModel" src="./glass_tea.glb"></a-asset-item>
            <a-asset-item id="cappuccinoModel" src="./cup_of_cappuccino.glb"></a-asset-item>
            <a-asset-item id="iceCoffeeModel" src="./ice_coffee.glb"></a-asset-item>
            <a-asset-item id="colaModel" src="./coca_cola_bottle_glass.glb"></a-asset-item>
            <a-asset-item id="sodaModel" src="./soda_can_kutu.glb"></a-asset-item>
            <a-asset-item id="waterModel" src="./water_bottle.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 3 2"></a-entity>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            
            <a-entity id="model-wrapper" position="0 0 0" rotation="0 0 0" scale="1 1 1">
                <a-gltf-model id="main-model" src=""></a-gltf-model>
            </a-entity>

        </a-entity>
    </a-scene>

    <div class="bottom-sheet">
        <div class="sheet-header">
            <h2 class="food-title" id="foodTitle">Yükleniyor...</h2>
            <span class="food-price" id="foodPrice">0 TL</span>
        </div>
        <div class="food-info-row">
            <span class="badge" id="foodCal">0 kcal</span>
            <span class="badge" style="background:#e67e22; color:white;">Dokun & Sürükle</span>
        </div>
        <p class="food-description" id="foodDesc">Lütfen bekleyin...</p>
        <button class="add-to-cart-btn" onclick="addToCart()">Siparişe Ekle</button>
    </div>

    <script>
        const allModels = [
            // --- YEMEKLER ---
            { file: "mustafa_-_adana.glb", cat: "yemekler", name: "Zırh Adana Kebap", price: "340 TL", cal: "620 kcal", desc: "Zırhta çekilmiş hakiki kuzu kıyması, közlenmiş biber ve domatesle.", scale: 0.6, rotY: 0, posY: -0.1 },
            { file: "mustafa_-_cig_kofte.glb", cat: "yemekler", name: "Etsiz Çiğ Köfte", price: "120 TL", cal: "310 kcal", desc: "Özel Urfa isotu ve taze yeşilliklerle yoğrulmuş geleneksel lezzet.", scale: 4.5, rotY: 0, posY: -0.1 },
            { file: "burger_and_chips.glb", cat: "yemekler", name: "Gurme Burger & Patates", price: "260 TL", cal: "750 kcal", desc: "150gr dana köfte, çıtır patates kızartması ve özel sos eşliğinde.", scale: 0.3, rotY: 0, posY: 0 },
            { file: "pide_turkish_pizzakusbaskasar.glb", cat: "yemekler", name: "Kuşbaşılı Kaşarlı Pide", price: "290 TL", cal: "680 kcal", desc: "Karadeniz usulü çıtır hamur üzerine dana kuşbaşı ve erimiş kaşar peyniri.", scale: 0.5, rotY: 0, posY: -0.1 },
            { file: "pizza.glb", cat: "yemekler", name: "Bol Malzemeli Pizza", price: "280 TL", cal: "700 kcal", desc: "Özel pizza sosu, sucuk, salam, mantar ve mısır taneleriyle İtalyan usulü.", scale: 0.4, rotY: 0, posY: -0.1 },
            { file: "gözleme.glb", cat: "yemekler", name: "Köy Usulü Gözleme", price: "140 TL", cal: "400 kcal", desc: "Sacda pişirilmiş taze el açması tereyağlı nefis gözleme.", scale: 0.5, rotY: 0, posY: -0.1 },
            
            // --- ATİŞTIRMALIKLAR ---
            { file: "pringles_chips_can.glb", cat: "atıştırmalıklar", name: "Pringles Orijinal", price: "90 TL", cal: "520 kcal", desc: "Çıtır patates cipsi keyfi, ikonik silindir kutusunda.", scale: 0.6, rotY: 180, posY: 0 },
            { file: "lays_kırmızı.glb", cat: "atıştırmalıklar", name: "Lays Klasik", price: "65 TL", cal: "480 kcal", desc: "İncecik kesilmiş tuzlu patates cipsi partisi.", scale: 0.5, rotY: 0, posY: 0 },
            { file: "chips_mavi.glb", cat: "atıştırmalıklar", name: "Ruffles Mavi Şekilli", price: "65 TL", cal: "490 kcal", desc: "Tırtıklı ve ekstra çıtır patates cipsi lezzeti.", scale: 0.5, rotY: 0, posY: 0 },
            
            // --- TATLILAR ---
            { file: "baklava_ince_tablak.glb", cat: "tatlılar", name: "Gaziantep Fıstıklı Baklava", price: "280 TL", cal: "450 kcal", desc: "40 kat incecik yufka arasına bol Antep boz fıstığı ve hakiki şerbet.", scale: 0.3, rotY: 0, posY: -0.1 },
            { file: "cookies.glb", cat: "tatlılar", name: "Çikolatalı Ev Kurabiyesi", price: "95 TL", cal: "320 kcal", desc: "Fırından yeni çıkmış, içi yumuşak parça çikolatalı kurabiyeler.", scale: 0.4, rotY: 0, posY: 0 },
            { file: "dessert_for_breakfast.glb", cat: "tatlılar", name: "Meyveli Pancake Kulesi", price: "180 TL", cal: "510 kcal", desc: "Akçaağaç şurubu, çilek ve yaban mersini ile tatlandırılmış pancake.", scale: 0.3, rotY: 0, posY: -0.1 },
            { file: "ice_cream.glb", cat: "tatlılar", name: "Meyveli İtalyan Dondurması", price: "110 TL", cal: "210 kcal", desc: "Doğal meyve özleriyle hazırlanmış serinletici el yapımı dondurma.", scale: 0.4, rotY: 0, posY: 0 },

            // --- İÇECEKLER ---
            { file: "ayran_turkish_drink_game_asset.glb", cat: "içecekler", name: "Köpüklü Yayık Ayranı", price: "45 TL", cal: "80 kcal", desc: "Doğal yoğurttan yapılmış, buz gibi ferahlatıcı tuzlu yayık ayranı.", scale: 0.15, rotY: 0, posY: 0 },
            { file: "turkish_coffee.glb", cat: "içecekler", name: "Okkalı Türk Kahvesi", price: "60 TL", cal: "5 kcal", desc: "Cezvede ağır ağır pişmiş, yanında lokumuyla bol köpüklü.", scale: 0.4, rotY: 0, posY: 0 },
            { file: "glass_tea.glb", cat: "içecekler", name: "İnce Belli Türk Çayı", price: "30 TL", cal: "0 kcal", desc: "Tavşan kanı renginde, taze demlenmiş sıcacık Türk çayı.", scale: 0.4, rotY: 0, posY: 0 },
            { file: "cup_of_cappuccino.glb", cat: "içecekler", name: "Köpüklü Cappuccino", price: "85 TL", cal: "120 kcal", desc: "Zengin espresso lezzeti ve kadife kıvamında sıcak süt köpüğü.", scale: 0.4, rotY: 0, posY: 0 },
            { file: "ice_coffee.glb", cat: "içecekler", name: "Buzlu Karamel Latte", price: "90 TL", cal: "110 kcal", desc: "Soğuk espresso, süt ve karamel şurubunun buzla mükemmel uyumu.", scale: 0.4, rotY: 0, posY: 0 },
            { file: "coca_cola_bottle_glass.glb", cat: "içecekler", name: "Coca-Cola (Cam Şişe)", price: "55 TL", cal: "140 kcal", desc: "Buz gibi klasik orijinal tat orijinal cam şişesinde.", scale: 0.35, rotY: 0, posY: 0 },
            { file: "soda_can_kutu.glb", cat: "içecekler", name: "Kutu Çilekli Soda", price: "40 TL", cal: "90 kcal", desc: "Ferahlatıcı, meyve aromalı soğuk kutu maden suyu.", scale: 0.35, rotY: 0, posY: 0 },
            { file: "water_bottle.glb", cat: "içecekler", name: "Doğal Kaynak Suyu", price: "20 TL", cal: "0 kcal", desc: "Serinletici, berrak ve sağlıklı pet şişe doğal kaynak suyu.", scale: 0.35, rotY: 0, posY: 0 }
        ];

        let currentCategory = "yemekler";
        let filteredModels = [];
        let activeIndex = 0;

        const wrapper = document.getElementById('model-wrapper');
        const mainModel = document.getElementById('main-model');
        
        let localX = 0, localY = 0;
        let baseScale = 1;
        let localRotY = 0;
        
        let startTouchX, startTouchY;
        let startPinchDist = null;
        let startAngle = null;
        let isDragging = false;

        // Sayfa ilk yüklendiğinde verileri dondurmadan hemen çalıştır (Güvenli Altyapı 🌟)
        window.addEventListener('DOMContentLoaded', () => {
            updateFilter();
        });

        function changeCategory(catName, btn) {
            currentCategory = catName;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateFilter();
        }

        function updateFilter() {
            filteredModels = allModels.filter(m => m.cat === currentCategory);
            activeIndex = 0;
            resetWrapperTransform();
            showModel();
        }

        function navigateModel(direction) {
            if (filteredModels.length === 0) return;
            activeIndex += direction;
            if (activeIndex >= filteredModels.length) activeIndex = 0;
            if (activeIndex < 0) activeIndex = filteredModels.length - 1;
            resetWrapperTransform();
            showModel();
        }

        function resetWrapperTransform() {
            localX = 0; localY = 0; baseScale = 1;
            if (wrapper) {
                wrapper.setAttribute('position', '0 0 0');
                wrapper.setAttribute('scale', '1 1 1');
            }
        }

        function showModel() {
            const current = filteredModels[activeIndex];
            if (!current) return;

            document.getElementById('modelCounter').innerText = `${activeIndex + 1} / ${filteredModels.length}`;

            if (mainModel) {
                mainModel.setAttribute('src', `./${current.file}`);
                mainModel.setAttribute('scale', `${current.scale} ${current.scale} ${current.scale}`);
                mainModel.setAttribute('position', `0 ${current.posY} 0`);
                localRotY = current.rotY;
                mainModel.setAttribute('rotation', `0 ${localRotY} 0`);
            }

            document.getElementById('foodTitle').innerText = current.name;
            document.getElementById('foodPrice').innerText = current.price;
            document.getElementById('foodCal').innerText = current.cal;
            document.getElementById('foodDesc').innerText = current.desc;
        }

        // HAREKET VE DOKUNMATİK SİSTEMİ (Yazım hataları tamamen temizlendi 🌟)
        window.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                startTouchX = e.touches[0].clientX;
                startTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                startPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                startAngle = Math.atan2(e.touches[1].clientY - e.touches[0].clientY, e.touches[1].clientX - e.touches[0].clientX);
            }
        });

        window.addEventListener('touchmove', function(e) {
            if (!wrapper || !mainModel) return;

            if (e.touches.length === 1 && isDragging) {
                let deltaX = e.touches[0].clientX - startTouchX;
                let deltaY = e.touches[0].clientY - startTouchY;

                localX += deltaX * 0.0025;
                localY -= deltaY * 0.0025;

                wrapper.setAttribute('position', `${localX} ${localY} 0`);

                startTouchX = e.touches[0].clientX;
                startTouchY = e.touches[0].clientY;
            } 
            else if (e.touches.length === 2) {
                if (startPinchDist) {
                    let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    let factor = currentDist / startPinchDist;
                    baseScale = baseScale * factor;
                    
                    if(baseScale < 0.1) baseScale = 0.1;
                    if(baseScale > 10) baseScale = 10;

                    wrapper.setAttribute('scale', `${baseScale} ${baseScale} ${baseScale}`);
                    startPinchDist = currentDist;
                }

                if (startAngle) {
                    let currentAngle = Math.atan2(e.touches[1].clientY - e.touches[0].clientY, e.touches[1].clientX - e.touches[0].clientX);
                    let angleDiff = currentAngle - startAngle;
                    
                    localRotY += angleDiff * (180 / Math.PI) * 0.4; 
                    mainModel.setAttribute('rotation', `0 ${localRotY} 0`);
                    startAngle = currentAngle;
                }
            }
        });

        window.addEventListener('touchend', function(e) {
            isDragging = false;
            startPinchDist = null;
            startAngle = null;
        });

        function addToCart() {
            alert(document.getElementById('foodTitle').innerText + " sipariş sepetine eklendi!");
        }
    </script>
</body>
</html>

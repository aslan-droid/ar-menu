<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sultan Sofrası AR Menü</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
        
        /* Geliştirilmiş Üst Arayüz (Asla Butonların Altında Kalmaz) */
        .ui-header {
            position: absolute; top: 0; left: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0) 100%);
            z-index: 999; /* En üst katmanda durmasını garanti eder */
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0 25px 0; box-sizing: border-box;
        }

        .site-title {
            color: #f1c40f; font-size: 26px; font-weight: 800; margin: 0 0 15px 0;
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .category-container {
            display: flex; justify-content: center; gap: 8px; width: 100%; flex-wrap: wrap; padding: 0 10px; box-sizing: border-box;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 16px; border-radius: 25px; font-weight: bold; color: white;
            cursor: pointer; transition: 0.2s; font-size: 13px; backdrop-filter: blur(5px);
        }
        
        .category-btn.active { background: #e67e22; color: white; border-color: #e67e22; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.5); }

        /* KULLANICI ETKİLEŞİM İPUCU */
        .interaction-tip {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #fff; padding: 6px 14px; border-radius: 15px;
            font-size: 11px; pointer-events: none; z-index: 900; text-align: center; display: none;
        }

        /* DETAY PANELİ (BOTTOM SHEET) */
        .bottom-sheet {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: white; border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 25px; box-sizing: border-box; z-index: 1000;
            transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        .bottom-sheet.open { bottom: 0; }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .food-title { margin: 0; font-size: 22px; color: #2c3e50; font-weight: 700; }
        .food-price { font-size: 20px; font-weight: bold; color: #e67e22; }
        .food-info-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .badge { background: #f0f3f4; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: #7f8c8d; font-weight: 600; }
        .food-description { color: #5d6d7e; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }
        .add-to-cart-btn {
            width: 100%; background: #2ecc71; color: white; border: none; padding: 15px;
            border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .close-handle { width: 40px; height: 5px; background: #ccc; border-radius: 3px; margin: -12px auto 15px auto; cursor: pointer; }
        .arjs-loader { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-header">
        <h1 class="site-title">Sultan Sofrası</h1>
        <div class="category-container">
            <button class="category-btn active" onclick="switchCategory('yemekler', this)">Yemekler</button>
            <button class="category-btn" onclick="switchCategory('atıştırmalıklar', this)">Atıştırmalıklar</button>
            <button class="category-btn" onclick="switchCategory('tatlılar', this)">Tatlılar</button>
            <button class="category-btn" onclick="switchCategory('içecekler', this)">İçecekler</button>
        </div>
    </div>

    <div class="interaction-tip" id="interactionTip">Modeli taşımak için sürükleyin, büyütmek için çift parmak kullanın.</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./menu.mind; filterMinCF:0.0005; filterBeta: 0.005;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="adanaModel" src="./mustafa_-_adana.glb"></a-asset-item>
            <a-asset-item id="cigKofteModel" src="./mustafa_-_cig_kofte.glb"></a-asset-item>
            <a-asset-item id="pringlesModel" src="./pringles_chips_can.glb"></a-asset-item>
            <a-asset-item id="baklavaModel" src="./baklava_ince_tablak.glb"></a-asset-item>
            <a-asset-item id="ayranModel" src="./ayran_turkish_drink_game_asset.glb"></a-asset-item>
            <a-asset-item id="kahveModel" src="./turkish_coffee.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

        <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 3 2"></a-entity>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            
            <a-entity id="group-yemekler" visible="true">
                <a-gltf-model 
                    id="model1" src="#adanaModel" class="clickable"
                    position="-0.2 0 0" scale="0.8 0.8 0.8" rotation="0 0 0"
                    metadata-name="Adana Kebap" metadata-price="340 TL" metadata-cal="620 kcal"
                    metadata-desc="Zırhta çekilmiş hakiki kuzu kıyması, özel pul biberi ve közlenmiş sebzelerle sunulur.">
                </a-gltf-model>
                
                <a-gltf-model 
                    id="model2" src="#cigKofteModel" class="clickable"
                    position="0.2 0 0" scale="4.5 4.5 4.5" rotation="0 0 0"
                    metadata-name="Etsiz Çiğ Köfte" metadata-price="120 TL" metadata-cal="310 kcal"
                    metadata-desc="Bol taze yeşillik, limon ve özel Urfa isotuyla yoğrulmuş enfes lezzet.">
                </a-gltf-model>
            </a-entity>

            <a-entity id="group-atıştırmalıklar" visible="false">
                <a-gltf-model 
                    id="model3" src="#pringlesModel" class="clickable"
                    position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"
                    metadata-name="Pringles Patates Cipsi" metadata-price="90 TL" metadata-cal="520 kcal"
                    metadata-desc="Özel kutusunda çıtır çıtır orijinal lezzet keyfi.">
                </a-gltf-model>
            </a-entity>

            <a-entity id="group-tatlılar" visible="false">
                <a-gltf-model 
                    id="model4" src="#baklavaModel" class="clickable"
                    position="0 0 0" scale="0.4 0.4 0.4" rotation="0 0 0"
                    metadata-name="Fıstıklı Baklava" metadata-price="280 TL" metadata-cal="450 kcal"
                    metadata-desc="Gaziantep'in boz fıstığıyla hazırlanmış, 40 kat ince yufkalı çıtır baklava.">
                </a-gltf-model>
            </a-entity>

            <a-entity id="group-içecekler" visible="false">
                <a-gltf-model 
                    id="model5" src="#ayranModel" class="clickable"
                    position="-0.2 0 0" scale="0.25 0.25 0.25" rotation="0 0 0"
                    metadata-name="Yayık Ayranı" metadata-price="45 TL" metadata-cal="80 kcal"
                    metadata-desc="Bol köpüklü, tamamen doğal ve buz gibi ferahlatıcı yayık ayranı.">
                </a-gltf-model>
                
                <a-gltf-model 
                    id="model6" src="#kahveModel" class="clickable"
                    position="0.2 0 0" scale="0.5 0.5 0.5" rotation="0 0 0"
                    metadata-name="Türk Kahvesi" metadata-price="60 TL" metadata-cal="5 kcal"
                    metadata-desc="Geleneksel yöntemlerle ağır ağır pişirilmiş bol köpüklü Türk kahvesi.">
                </a-gltf-model>
            </a-entity>

        </a-entity>
    </a-scene>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="close-handle" onclick="closePanel()"></div>
        <div class="sheet-header">
            <h2 class="food-title" id="foodTitle">Yemek Adı</h2>
            <span class="food-price" id="foodPrice">00 TL</span>
        </div>
        <div class="food-info-row">
            <span class="badge" id="foodCal">000 kcal</span>
            <span class="badge" style="background:#e67e22; color:white;">AR Dünyası</span>
        </div>
        <p class="food-description" id="foodDesc">Açıklama</p>
        <button class="add-to-cart-btn" onclick="addToCart()">Siparişe Ekle</button>
    </div>

    <script>
        let selectedModel = null;
        let isDragging = false;
        let previousTouchX, previousTouchY;
        let initialPinchDist = null;
        let initialScale = null;

        const sheet = document.getElementById('bottomSheet');
        const tip = document.getElementById('interactionTip');

        // --- 1. KATEGORİ DEĞİŞTİRME ---
        function switchCategory(categoryName, btnElement) {
            const groups = ['yemekler', 'atıştırmalıklar', 'tatlılar', 'içecekler'];
            groups.forEach(group => {
                document.getElementById('group-' + group).setAttribute('visible', 'false');
            });
            document.getElementById('group-' + categoryName).setAttribute('visible', 'true');
            
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            selectedModel = null;
            tip.style.display = "none";
            closePanel();
        }

        // --- 2. MODEL SEÇME VE PANEL AÇMA ---
        document.querySelectorAll('.clickable').forEach(model => {
            model.addEventListener('click', function (evt) {
                selectedModel = this; // Dokunulan modeli seçili yap
                
                // Bilgileri panele doldur
                document.getElementById('foodTitle').innerText = this.getAttribute('metadata-name');
                document.getElementById('foodPrice').innerText = this.getAttribute('metadata-price');
                document.getElementById('foodCal').innerText = this.getAttribute('metadata-cal');
                document.getElementById('foodDesc').innerText = this.getAttribute('metadata-desc');
                
                sheet.classList.add('open');
                tip.style.display = "block"; // Kullanıcıya ipucunu göster
            });
        });

        // --- 3. DOĞRUDAN DOKUNMATİK HAREKET SİSTEMİ (SÜRÜKLEME VE BÜYÜTME) ---
        window.addEventListener('touchstart', function(e) {
            if (!selectedModel) return;

            if (e.touches.length === 1) {
                // Tek parmak: Sürükleme başlangıcı
                isDragging = true;
                previousTouchX = e.touches[0].clientX;
                previousTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                // Çift parmak: Büyütme/Küçültme başlangıcı
                isDragging = false;
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialScale = selectedModel.getAttribute('scale');
            }
        });

        window.addEventListener('touchmove', function(e) {
            if (!selectedModel) return;

            if (e.touches.length === 1 && isDragging) {
                // SÜRÜKLEME (Modeli X ve Y ekseninde kaydırır)
                let deltaX = e.touches[0].clientX - previousTouchX;
                let deltaY = e.touches[0].clientY - previousTouchY;

                let currentPos = selectedModel.getAttribute('position');
                
                // Hassasiyet çarpanı (0.002) - İsteğe göre hızlandırıp yavaşlatabilirsin
                let newX = currentPos.x + (deltaX * 0.003);
                let newY = currentPos.y - (deltaY * 0.003); 

                selectedModel.setAttribute('position', `${newX} ${newY} ${currentPos.z}`);

                previousTouchX = e.touches[0].clientX;
                previousTouchY = e.touches[0].clientY;
            } 
            else if (e.touches.length === 2 && initialPinchDist) {
                // BÜYÜTME / KÜÇÜLTME (Pinch to Zoom)
                let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                let factor = currentDist / initialPinchDist;

                let newScaleX = initialScale.x * factor;
                let newScaleY = initialScale.y * factor;
                let newScaleZ = initialScale.z * factor;

                // Aşırı büyük veya görünmeyecek kadar küçük olmasını engelleme sınırları
                if (newScaleX > 0.05 && newScaleX < 15) {
                    selectedModel.setAttribute('scale', `${newScaleX} ${newScaleY} ${newScaleZ}`);
                }
            }
        });

        window.addEventListener('touchend', function(e) {
            isDragging = false;
            initialPinchDist = null;
        });

        function closePanel() { sheet.classList.remove('open'); }
        function addToCart() { alert(document.getElementById('foodTitle').innerText + " siparişe eklendi!"); closePanel(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sultan Sofrası AR Menü</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/fcor/ar-gesture-handler@master/dist/gesture-detector.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/fcor/ar-gesture-handler@master/dist/gesture-handler.js"></script>
    
    <style>
        /* TEMEL STİLLER */
        body { margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; -webkit-user-select: none; user-select: none; }
        
        /* MODERN ÜST ARAYÜZ (HEADER) */
        .ui-header {
            position: absolute; top: 0; left: 0; width: 100%; height: auto;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            z-index: 100; /* Her şeyin üstünde durması için */
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; padding-bottom: 20px;
        }

        /* YENİ SİTE İSMİ */
        .site-title {
            color: #f1c40f; font-size: 24px; font-weight: 800; margin: 0 0 15px 0; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* KATEGORİ BUTONLARI KONTEYNERİ */
        .category-container {
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 10px;
        }

        /* MODERN KATEGORİ BUTON STİLİ */
        .category-btn {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 14px; border-radius: 20px; font-weight: 600; color: white;
            cursor: pointer; transition: 0.3s; font-size: 12px; backdrop-filter: blur(5px);
        }
        
        /* AKTİF BUTON STİLİ */
        .category-btn.active { background: #e67e22; color: white; border-color: #e67e22; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.5); }

        /* AŞAĞIDAN AÇILAN DETAY PANELİ (BOTTOM SHEET) */
        .bottom-sheet {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: white; border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 25px; box-sizing: border-box; z-index: 110; /* Header'ın da üstünde */
            transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }
        .bottom-sheet.open { bottom: 0; }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .food-title { margin: 0; font-size: 22px; color: #2c3e50; font-weight: 700; }
        .food-price { font-size: 20px; font-weight: bold; color: #e67e22; }
        .food-info-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .badge { background: #f0f3f4; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: #7f8c8d; font-weight: 600; }
        .food-description { color: #5d6d7e; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }
        .add-to-cart-btn {
            width: 100%; background: #2ecc71; color: white; border: none; padding: 15px;
            border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .close-handle { width: 40px; height: 5px; background: #ccc; border-radius: 3px; margin: -12px auto 15px auto; cursor: pointer; }
        
        /* A-FRAME YÜKLENİYOR EKRANINI GİZLE (Modern görünüm için) */
        .arjs-loader { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-header">
        <h1 class="site-title">Sultan Sofrası</h1> <div class="category-container">
            <button class="category-btn active" onclick="switchCategory('yemekler', this)">Yemekler</button>
            <button class="category-btn" onclick="switchCategory('atıştırmalıklar', this)">Atıştırmalıklar</button>
            <button class="category-btn" onclick="switchCategory('tatlılar', this)">Tatlılar</button>
            <button class="category-btn" onclick="switchCategory('içecekler', this)">İçecekler</button>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./menu.mind; uiLoading:yes; uiError:yes; filterMinCF:0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        gesture-detector> <a-assets>
            <a-asset-item id="adanaModel" src="./mustafa_-_adana.glb"></a-asset-item>
            <a-asset-item id="cigKofteModel" src="./mustafa_-_cig_kofte.glb"></a-asset-item>
            
            <a-asset-item id="pringlesModel" src="./pringles_chips_can.glb"></a-asset-item>
            
            <a-asset-item id="baklavaModel" src="./baklava_ince_tablak.glb"></a-asset-item>
            
            <a-asset-item id="ayranModel" src="./ayran_turkish_drink_game_asset.glb"></a-asset-item>
            <a-asset-item id="kahveModel" src="./turkish_coffee.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; intensity: 0.7; castShadow: true;" position="1 4 2"></a-entity>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            
            <a-entity id="group-yemekler" visible="true">
                <a-gltf-model 
                    src="#adanaModel" position="0 -0.1 0" scale="0.4 0.4 0.4" class="clickable" gesture-handler
                    metadata-name="Adana Kebap" metadata-price="340 TL" metadata-cal="620 kcal"
                    metadata-desc="Zırhta çekilmiş hakiki kuzu kıyması, özel baharatlar ve közlenmiş sebzelerle.">
                </a-gltf-model>
                <a-gltf-model 
                    src="#cigKofteModel" position="0.3 -0.1 0" scale="0.3 0.3 0.3" class="clickable" gesture-handler
                    metadata-name="Etsiz Çiğ Köfte" metadata-price="120 TL" metadata-cal="310 kcal"
                    metadata-desc="Bol taze yeşillik, limon ve nar ekşisi eşliğinde günlük taze yoğrulmuş.">
                </a-gltf-model>
            </a-entity>

            <a-entity id="group-atıştırmalıklar" visible="false">
                <a-gltf-model 
                    src="#pringlesModel" position="0 0 0" scale="1 1 1" class="clickable" gesture-handler
                    metadata-name="Pringles Orijinal" metadata-price="90 TL" metadata-cal="520 kcal"
                    metadata-desc="Klasik Pringles lezzeti, çıtır çıtır patates cipsi.">
                </a-gltf-model>
            </a-entity>

            <a-entity id="group-tatlılar" visible="false">
                <a-gltf-model 
                    src="#baklavaModel" position="0 -0.1 0" scale="0.2 0.2 0.2" class="clickable" gesture-handler
                    metadata-name="Fıstıklı Baklava" metadata-price="280 TL" metadata-cal="450 kcal"
                    metadata-desc="Gaziantep boz fıstığı ile hazırlanmış, incecik yufkalı çıtır lezzet.">
                </a-gltf-model>
            </a-entity>

            <a-entity id="group-içecekler" visible="false">
                <a-gltf-model 
                    src="#ayranModel" position="-0.2 0 0" scale="0.8 0.8 0.8" class="clickable" gesture-handler
                    metadata-name="Yayık Ayranı" metadata-price="45 TL" metadata-cal="80 kcal"
                    metadata-desc="Bol köpüklü, soğuk ve doğal yoğurttan hazırlanmış ferahlatıcı ayran.">
                </a-gltf-model>
                <a-gltf-model 
                    src="#kahveModel" position="0.2 0 0" scale="0.3 0.3 0.3" class="clickable" gesture-handler
                    metadata-name="Türk Kahvesi" metadata-price="60 TL" metadata-cal="5 kcal"
                    metadata-desc="Taze çekilmiş Orta kavrulmuş kahve çekirdeklerinden, bakır cezwede ağır ağır pişmiş.">
                </a-gltf-model>
            </a-entity>

        </a-entity>
    </a-scene>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="close-handle" onclick="closePanel()"></div>
        <div class="sheet-header">
            <h2 class="food-title" id="foodTitle">Yemek Adı</h2>
            <span class="food-price" id="foodPrice">00 TL</span>
        </div>
        <div class="food-info-row">
            <span class="badge" id="foodCal">000 kcal</span>
            <span class="badge">Sultanın Tercihi</span>
        </div>
        <p class="food-description" id="foodDesc">Yemek açıklaması buraya gelecek.</p>
        <button class="add-to-cart-btn" onclick="addToCart()">Siparişe Ekle</button>
    </div>

    <script>
        // --- KATEGORİ DEĞİŞTİRME MANTIĞI ---
        function switchCategory(categoryName, btnElement) {
            // 1. Tüm grupları gizle
            const groups = ['yemekler', 'atıştırmalıklar', 'tatlılar', 'içecekler'];
            groups.forEach(group => {
                document.getElementById('group-' + group).setAttribute('visible', 'false');
            });

            // 2. Seçilen grubu göster
            document.getElementById('group-' + categoryName).setAttribute('visible', 'true');

            // 3. Butonların aktiflik durumunu güncelle
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // 4. Eğer panel açıksa kapat
            closePanel();
        }

        // --- DETAY PANELİ MANTIĞI ---
        const sheet = document.getElementById('bottomSheet');

        // Modeller yüklendikten sonra tıklama olaylarını dinle
        window.addEventListener('load', () => {
            document.querySelectorAll('.clickable').forEach(model => {
                model.addEventListener('click', function (evt) {
                    // Verileri modelden alıp panele yaz
                    document.getElementById('foodTitle').innerText = this.getAttribute('metadata-name');
                    document.getElementById('foodPrice').innerText = this.getAttribute('metadata-price');
                    document.getElementById('foodCal').innerText = this.getAttribute('metadata-cal');
                    document.getElementById('foodDesc').innerText = this.getAttribute('metadata-desc');
                    
                    // Paneli aç
                    sheet.classList.add('open');
                });
            });
        });

        function closePanel() {
            sheet.classList.remove('open');
        }

        function addToCart() {
            alert(document.getElementById('foodTitle').innerText + " siparişe eklendi!");
            closePanel();
        }
    </script>
</body>
</html>

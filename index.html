<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR MENÜ</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
        
        /* ÜST BAŞLIK VE KATEGORİ PANELİ */
        .ui-header {
            position: absolute; top: 0; left: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 75%, rgba(0,0,0,0) 100%);
            z-index: 999; display: flex; flex-direction: column; align-items: center;
            padding: 15px 0 20px 0; box-sizing: border-box;
        }
        .site-title {
            color: #f1c40f; font-size: 26px; font-weight: 800; margin: 0 0 12px 0;
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        .category-container { display: flex; justify-content: center; gap: 6px; width: 100%; flex-wrap: wrap; padding: 0 10px; box-sizing: border-box; }
        .category-btn {
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 12px; border-radius: 20px; font-weight: bold; color: white;
            cursor: pointer; transition: 0.2s; font-size: 11px; backdrop-filter: blur(5px);
        }
        .category-btn.active { background: #e67e22; color: white; border-color: #e67e22; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.5); }

        /* SAĞ VE SOL İLERİ/GERİ OK BUTONLARI */
        .nav-arrow {
            position: absolute; top: 45%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6); color: #f1c40f; border: 2px solid rgba(255,255,255,0.2);
            width: 55px; height: 55px; border-radius: 50%; font-size: 24px; font-weight: bold;
            z-index: 998; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .nav-arrow:active { transform: translateY(-50%) scale(0.9); background: #e67e22; color: white; }
        .nav-arrow.left { left: 15px; }
        .nav-arrow.right { right: 15px; }

        /* MODEL BİLGİSİ İPUCU */
        .model-counter {
            position: absolute; top: 115px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 5px 15px; border-radius: 15px;
            font-size: 12px; font-weight: 600; z-index: 990; pointer-events: none;
        }

        /* DETAY PANELİ (BOTTOM SHEET) */
        .bottom-sheet {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: white; border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 20px 24px 25px 24px; box-sizing: border-box; z-index: 1000;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.3);
        }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .food-title { margin: 0; font-size: 20px; color: #2c3e50; font-weight: 700; }
        .food-price { font-size: 18px; font-weight: bold; color: #e67e22; }
        .food-info-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .badge { background: #f0f3f4; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: #7f8c8d; font-weight: 600; }
        .food-description { color: #5d6d7e; font-size: 13px; line-height: 1.4; margin: 0 0 15px 0; height: 38px; overflow-y: auto; }
        .add-to-cart-btn {
            width: 100%; background: #2ecc71; color: white; border: none; padding: 14px;
            border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(46,204,113,0.2);
        }
        .arjs-loader { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-header">
        <h1 class="site-title">AR MENÜ</h1>
        <div class="category-container">
            <button class="category-btn active" onclick="changeCategory('yemekler', this)">Yemekler</button>
            <button class="category-btn" onclick="changeCategory('atıştırmalıklar', this)">Atıştırmalıklar</button>
            <button class="category-btn" onclick="changeCategory('tatlılar', this)">Tatlılar</button>
            <button class="category-btn" onclick="changeCategory('içecekler', this)">İçecekler</button>
        </div>
    </div>

    <button class="nav-arrow left" onclick="navigateModel(-1)">❮</button>
    <button class="nav-arrow right" onclick="navigateModel(1)">❯</button>

    <div class="model-counter" id="modelCounter">1 / 6</div>

    <a-scene mindar-image="imageTargetSrc: ./menu.mind; filterMinCF:0.001; filterBeta: 0.01;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="m-adana" src="./mustafa_-_adana.glb"></a-asset-item>
            <a-asset-item id="m-cigkofte" src="./mustafa_-_cig_kofte.glb"></a-asset-item>
            <a-asset-item id="m-burger" src="./burger_and_chips.glb"></a-asset-item>
            <a-asset-item id="m-pide" src="./pide_turkish_pizzakusbaskasar.glb"></a-asset-item>
            <a-asset-item id="m-pizza" src="./pizza.glb"></a-asset-item>
            <a-asset-item id="m-gozleme" src="./gözleme.glb"></a-asset-item>
            <a-asset-item id="m-pringles" src="./pringles_chips_can.glb"></a-asset-item>
            <a-asset-item id="m-lays" src="./lays_kırmızı.glb"></a-asset-item>
            <a-asset-item id="m-chips" src="./chips_mavi.glb"></a-asset-item>
            <a-asset-item id="m-baklava" src="./baklava_ince_tablak.glb"></a-asset-item>
            <a-asset-item id="m-cookies" src="./cookies.glb"></a-asset-item>
            <a-asset-item id="m-pancake" src="./dessert_for_breakfast.glb"></a-asset-item>
            <a-asset-item id="m-icecream" src="./ice_cream.glb"></a-asset-item>
            <a-asset-item id="m-ayran" src="./ayran_turkish_drink_game_asset.glb"></a-asset-item>
            <a-asset-item id="m-kahve" src="./turkish_coffee.glb"></a-asset-item>
            <a-asset-item id="m-tea" src="./glass_tea.glb"></a-asset-item>
            <a-asset-item id="m-cappuccino" src="./cup_of_cappuccino.glb"></a-asset-item>
            <a-asset-item id="m-icecoffee" src="./ice_coffee.glb"></a-asset-item>
            <a-asset-item id="m-cola" src="./coca_cola_bottle_glass.glb"></a-asset-item>
            <a-asset-item id="m-soda" src="./soda_can_kutu.glb"></a-asset-item>
            <a-asset-item id="m-water" src="./water_bottle.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity light="type: ambient; intensity: 1.1;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            
            <a-entity id="model-wrapper" position="0 0 0" rotation="0 0 0" scale="1 1 1">
                
                <a-gltf-model id="item-adana" src="#m-adana" visible="false" scale="1.4 1.4 1.4" rotation="20 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-cigkofte" src="#m-cigkofte" visible="false" scale="5.5 5.5 5.5" rotation="20 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-burger" src="#m-burger" visible="false" scale="0.08 0.08 0.08" rotation="15 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-pide" src="#m-pide" visible="false" scale="0.6 0.6 0.6" rotation="10 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-pizza" src="#m-pizza" visible="false" scale="1.4 1.4 1.4" rotation="25 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-gozleme" src="#m-gozleme" visible="false" scale="1.5 1.5 1.5" rotation="20 0 0" position="0 -0.1 0"></a-gltf-model>
                
                <a-gltf-model id="item-pringles" src="#m-pringles" visible="false" scale="1.5 1.5 1.5" rotation="0 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-lays" src="#m-lays" visible="false" scale="0.035 0.035 0.035" rotation="15 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-chips" src="#m-chips" visible="false" scale="0.035 0.035 0.035" rotation="15 0 0" position="0 -0.1 0"></a-gltf-model>
                
                <a-gltf-model id="item-baklava" src="#m-baklava" visible="false" scale="0.8 0.8 0.8" rotation="20 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-cookies" src="#m-cookies" visible="false" scale="3.8 3.8 3.8" rotation="15 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-pancake" src="#m-pancake" visible="false" scale="3.2 3.2 3.2" rotation="15 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-icecream" src="#m-icecream" visible="false" scale="0.07 0.07 0.07" rotation="10 0 0" position="0 -0.1 0"></a-gltf-model>

                <a-gltf-model id="item-ayran" src="#m-ayran" visible="false" scale="0.15 0.15 0.15" rotation="0 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-kahve" src="#m-kahve" visible="false" scale="1.4 1.4 1.4" rotation="10 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-tea" src="#m-tea" visible="false" scale="0.04 0.04 0.04" rotation="10 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-cappuccino" src="#m-cappuccino" visible="false" scale="1.4 1.4 1.4" rotation="10 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-icecoffee" src="#m-icecoffee" visible="false" scale="1.4 1.4 1.4" rotation="10 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-cola" src="#m-cola" visible="false" scale="0.8 0.8 0.8" rotation="0 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-soda" src="#m-soda" visible="false" scale="0.8 0.8 0.8" rotation="0 0 0" position="0 -0.1 0"></a-gltf-model>
                <a-gltf-model id="item-water" src="#m-water" visible="false" scale="0.15 0.15 0.15" rotation="0 0 0" position="0 -0.1 0"></a-gltf-model>
            </a-entity>

        </a-entity>
    </a-scene>

    <div class="bottom-sheet">
        <div class="sheet-header">
            <h2 class="food-title" id="foodTitle">Yükleniyor...</h2>
            <span class="food-price" id="foodPrice">0 TL</span>
        </div>
        <div class="food-info-row">
            <span class="badge" id="foodCal">0 kcal</span>
            <span class="badge" style="background:#e67e22; color:white;">Dokun & Sürükle</span>
        </div>
        <p class="food-description" id="foodDesc">Lütfen bekleyin...</p>
        <button class="add-to-cart-btn" onclick="addToCart()">Siparişe Ekle</button>
    </div>

    <script>
        const menuData = {
            yemekler: [
                { id: "item-adana", name: "Zırh Adana Kebap", price: "340 TL", cal: "620 kcal", desc: "Zırhta çekilmiş hakiki kuzu kıyması, közlenmiş biber ve domatesle." },
                { id: "item-cigkofte", name: "Etsiz Çiğ Köfte", price: "120 TL", cal: "310 kcal", desc: "Özel Urfa isotu ve taze yeşilliklerle yoğrulmuş geleneksel lezzet." },
                { id: "item-burger", name: "Gurme Burger & Patates", price: "260 TL", cal: "750 kcal", desc: "150gr dana köfte, çıtır patates kızartması ve özel sos eşliğinde." },
                { id: "item-pide", name: "Kuşbaşılı Kaşarlı Pide", price: "290 TL", cal: "680 kcal", desc: "Karadeniz usulü çıtır hamur üzerine dana kuşbaşı ve erimiş kaşar peyniri." },
                { id: "item-pizza", name: "Bol Malzemeli Pizza", price: "280 TL", cal: "700 kcal", desc: "Özel pizza sosu, sucuk, salam, mantar ve mısır taneleriyle İtalyan usulü." },
                { id: "item-gozleme", name: "Köy Usulü Gözleme", price: "140 TL", cal: "400 kcal", desc: "Sacda pişirilmiş taze el açması tereyağlı nefis gözleme." }
            ],
            atıştırmalıklar: [
                { id: "item-pringles", name: "Pringles Orijinal", price: "90 TL", cal: "520 kcal", desc: "Çıtır patates cipsi keyfi, ikonik silindir kutusunda." },
                { id: "item-lays", name: "Lays Klasik", price: "65 TL", cal: "480 kcal", desc: "İncecik kesilmiş tuzlu patates cipsi partisi." },
                { id: "item-chips", name: "Ruffles Mavi Şekilli", price: "65 TL", cal: "490 kcal", desc: "Tırtıklı ve ekstra çıtır patates cipsi lezzeti." }
            ],
            tatlılar: [
                { id: "item-baklava", name: "Gaziantep Fıstıklı Baklava", price: "280 TL", cal: "450 kcal", desc: "40 kat incecik yufka arasına bol Antep boz fıstığı ve hakiki şerbet." },
                { id: "item-cookies", name: "Çikolatalı Ev Kurabiyesi", price: "95 TL", cal: "320 kcal", desc: "Fırından yeni çıkmış, içi yumuşak parça çikolatalı kurabiyeler." },
                { id: "item-pancake", name: "Meyveli Pancake Kulesi", price: "180 TL", cal: "510 kcal", desc: "Akçaağaç şurubu, çilek ve yaban mersini ile tatlandırılmış pancake." },
                { id: "item-icecream", name: "Meyveli İtalyan Dondurması", price: "110 TL", cal: "210 kcal", desc: "Doğal meyve özleriyle hazırlanmış serinletici el yapımı dondurma." }
            ],
            içecekler: [
                { id: "item-ayran", name: "Köpüklü Yayık Ayranı", price: "45 TL", cal: "80 kcal", desc: "Doğal yoğurttan yapılmış, buz gibi ferahlatıcı tuzlu yayık ayranı." },
                { id: "item-kahve", name: "Okkalı Türk Kahvesi", price: "60 TL", cal: "5 kcal", desc: "Cezvede ağır ağır pişmiş, yanında lokumuyla bol köpüklü." },
                { id: "item-tea", name: "İnce Belli Türk Çayı", price: "30 TL", cal: "0 kcal", desc: "Tavşan kanı renginde, taze demlenmiş sıcacık Türk çayı." },
                { id: "item-cappuccino", name: "Köpüklü Cappuccino", price: "85 TL", cal: "120 kcal", desc: "Zengin espresso lezzeti ve kadife kıvamında sıcak süt köpüğü." },
                { id: "item-icecoffee", name: "Buzlu Karamel Latte", price: "90 TL", cal: "110 kcal", desc: "Soğuk espresso, süt ve karamel şurubunun buzla mükemmel uyumu." },
                { id: "item-cola", name: "Coca-Cola (Cam Şişe)", price: "55 TL", cal: "140 kcal", desc: "Buz gibi klasik orijinal tat orijinal cam şişesinde." },
                { id: "item-soda", name: "Kutu Çilekli Soda", price: "40 TL", cal: "90 kcal", desc: "Ferahlatıcı, meyve aromalı soğuk kutu maden suyu." },
                { id: "item-water", name: "Doğal Kaynak Suyu", price: "20 TL", cal: "0 kcal", desc: "Serinletici, berrak ve sağlıklı pet şişe doğal kaynak suyu." }
            ]
        };

        let currentCategory = "yemekler";
        let activeIndex = 0;

        const wrapper = document.getElementById('model-wrapper');
        let localX = 0, localY = 0;
        let baseScale = 1;
        let localRotY = 0;
        let startTouchX, startTouchY, startPinchDist, startAngle;
        let isDragging = false;

        window.addEventListener('DOMContentLoaded', () => {
            updateFilter();
        });

        function changeCategory(catName, btn) {
            currentCategory = catName;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateFilter();
        }

        function updateFilter() {
            activeIndex = 0;
            resetAllVisibility();
            resetWrapperTransform();
            showActiveModel();
        }

        function navigateModel(direction) {
            const list = menuData[currentCategory];
            activeIndex += direction;
            if (activeIndex >= list.length) activeIndex = 0;
            if (activeIndex < 0) activeIndex = list.length - 1;
            resetAllVisibility();
            resetWrapperTransform();
            showActiveModel();
        }

        function resetAllVisibility() {
            Object.keys(menuData).forEach(cat => {
                menuData[cat].forEach(item => {
                    const el = document.getElementById(item.id);
                    if (el) el.setAttribute('visible', 'false');
                });
            });
        }

        function resetWrapperTransform() {
            localX = 0; localY = 0; baseScale = 1; localRotY = 0;
            if (wrapper) {
                wrapper.setAttribute('position', '0 0 0');
                wrapper.setAttribute('scale', '1 1 1');
            }
        }

        function showActiveModel() {
            const list = menuData[currentCategory];
            const current = list[activeIndex];
            if (!current) return;

            document.getElementById('modelCounter').innerText = `${activeIndex + 1} / ${list.length}`;

            // Aktif olan modeli görünür yapıyoruz 🌟
            const activeEl = document.getElementById(current.id);
            if (activeEl) activeEl.setAttribute('visible', 'true');

            document.getElementById('foodTitle').innerText = current.name;
            document.getElementById('foodPrice').innerText = current.price;
            document.getElementById('foodCal').innerText = current.cal;
            document.getElementById('foodDesc').innerText = current.desc;
        }

        // DOKUNMATİK EKRAN HAREKET DÖNGÜSÜ
        window.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                startTouchX = e.touches[0].clientX;
                startTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                startPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                startAngle = Math.atan2(e.touches[1].clientY - e.touches[0].clientY, e.touches[1].clientX - e.touches[0].clientX);
            }
        });

        window.addEventListener('touchmove', function(e) {
            if (!wrapper) return;

            if (e.touches.length === 1 && isDragging) {
                let deltaX = e.touches[0].clientX - startTouchX;
                let deltaY = e.touches[0].clientY - startTouchY;

                localX += deltaX * 0.003;
                localY -= deltaY * 0.003;
                wrapper.setAttribute('position', `${localX} ${localY} 0`);

                startTouchX = e.touches[0].clientX;
                startTouchY = e.touches[0].clientY;
            } 
            else if (e.touches.length === 2) {
                if (startPinchDist) {
                    let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    let factor = currentDist / startPinchDist;
                    baseScale = baseScale * factor;
                    if(baseScale < 0.1) baseScale = 0.1;
                    if(baseScale > 10) baseScale = 10;
                    wrapper.setAttribute('scale', `${baseScale} ${baseScale} ${baseScale}`);
                    startPinchDist = currentDist;
                }

                if (startAngle) {
                    let currentAngle = Math.atan2(e.touches[1].clientY - e.touches[0].clientY, e.touches[1].clientX - e.touches[0].clientX);
                    let angleDiff = currentAngle - startAngle;
                    
                    const list = menuData[currentCategory];
                    const currentModelObj = document.getElementById(list[activeIndex].id);
                    if (currentModelObj) {
                        let currentRot = currentModelObj.getAttribute('rotation');
                        localRotY = currentRot.y + (angleDiff * (180 / Math.PI) * 0.5);
                        currentModelObj.setAttribute('rotation', `${currentRot.x} ${localRotY} ${currentRot.z}`);
                    }
                    startAngle = currentAngle;
                }
            }
        });

        window.addEventListener('touchend', function() { isDragging = false; startPinchDist = null; startAngle = null; });
        function addToCart() { alert(document.getElementById('foodTitle').innerText + " sipariş sepetine eklendi!"); }
    </script>
</body>
</html>
